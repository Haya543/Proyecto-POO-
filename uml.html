<div id="uml" style="padding: 1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2e2b52' : '#EEEDFE',
    primaryTextColor: dark ? '#cbc8f6' : '#3C3489',
    primaryBorderColor: dark ? '#7F77DD' : '#7F77DD',
    secondaryColor: dark ? '#0d4433' : '#E1F5EE',
    secondaryTextColor: dark ? '#5DCAA5' : '#0F6E56',
    tertiaryColor: dark ? '#3d1c28' : '#FBEAF0',
    tertiaryTextColor: dark ? '#ED93B1' : '#72243E',
    noteBkgColor: dark ? '#2c2c2a' : '#F1EFE8',
    noteTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    classDiagramTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `classDiagram
    class TipoElemento {
        <<enumeration>>
        FUEGO
        AGUA
        PLANTA
        ELECTRICO
        TIERRA
        HIELO
        NORMAL
    }

    class Categoria {
        <<enumeration>>
        FISICO
        ESPECIAL
        ESTADO
    }

    class Nivelable {
        <<interface>>
        +ganarExp(int exp) void
        +subirNivel() void
    }

    class Capturable {
        <<interface>>
        +getTasaCaptura() double
        +atrapar() boolean
    }

    class Movimiento {
        -String nombre
        -TipoElemento tipo
        -Categoria categoria
        -int poder
        -int precision
        -int ppActual
        -int ppMax
        +usar() boolean
        +restaurarPP() void
        +getPoder() int
    }

    class Criatura {
        <<abstract>>
        -String nombre
        -int nivel
        -int hp
        -int hpMax
        -int ataque
        -int defensa
        -int velocidad
        -int expTotal
        -TipoElemento[] tipos
        -Movimiento[] movimientos
        +atacar(Movimiento mov) int
        +recibirDanio(int danio) void
        +estaViva() boolean
        +getStats() int[]
    }

    class CriaturaFuego {
        -int calor
        +habilidadEspecial() void
    }

    class CriaturaAgua {
        -int humedad
        +habilidadEspecial() void
    }

    class CriaturaPlanta {
        -int fotosintesis
        +habilidadEspecial() void
    }

    class Entrenador {
        <<abstract>>
        #String nombre
        #Criatura[] equipo
        +elegirCriatura() Criatura
        +tieneCriaturasVivas() boolean
        +getNombre() String
    }

    class Jugador {
        -Objeto[] bolsa
        -int dinero
        -int medallas
        +usarObjeto(Objeto obj, Criatura c) void
        +atraparCriatura(Criatura c) boolean
    }

    class EntrenadorNPC {
        -String dialogo
        -int dificultad
        -int recompensa
        +elegirMovimiento() Movimiento
        +saludar() String
    }

    class Objeto {
        <<abstract>>
        -String nombre
        -String descripcion
        -int cantidad
        +usar(Criatura objetivo) void
        +getNombre() String
    }

    class ObjetoCuracion {
        -int cantidadCura
        +usar(Criatura objetivo) void
    }

    class PokeEsfera {
        -double tasaCaptura
        +lanzar(Criatura objetivo) boolean
    }

    class Batalla {
        -Entrenador atacante
        -Entrenador defensor
        -int turnoActual
        -boolean esActiva
        +iniciar() void
        +ejecutarTurno(Movimiento mov) void
        +calcularDanio(Movimiento m, Criatura at, Criatura def) int
        +calcularVentajaTipo() double
        +haTerminado() boolean
    }

    Criatura <|-- CriaturaFuego
    Criatura <|-- CriaturaAgua
    Criatura <|-- CriaturaPlanta
    Criatura ..|> Nivelable
    CriaturaFuego ..|> Capturable
    CriaturaAgua ..|> Capturable
    CriaturaPlanta ..|> Capturable
    Entrenador <|-- Jugador
    Entrenador <|-- EntrenadorNPC
    Objeto <|-- ObjetoCuracion
    Objeto <|-- PokeEsfera
    Movimiento --> TipoElemento
    Movimiento --> Categoria
    Criatura --> TipoElemento
    Criatura "1" *-- "0..4" Movimiento : movimientos
    Entrenador "1" *-- "1..6" Criatura : equipo
    Jugador "1" *-- "0..*" Objeto : bolsa
    Batalla "1" --> "2" Entrenador : enfrenta
`;

const { svg } = await mermaid.render('uml-svg', diagram);
document.getElementById('uml').innerHTML = svg;
</script>
